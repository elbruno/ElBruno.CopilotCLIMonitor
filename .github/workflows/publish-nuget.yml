name: Publish NuGet

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: windows-latest

    permissions:
      contents: write
      id-token: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Extract version from tag
      id: tag
      shell: pwsh
      run: |
        $version = "${{ github.event.release.tag_name }}" -replace '^v', ''
        "VERSION=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        Write-Host "Version: $version"

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore .\ElBruno.CopilotCLIMonitor.sln

    - name: Build
      run: dotnet build .\ElBruno.CopilotCLIMonitor.sln --configuration Release --no-restore /p:Version=${{ steps.tag.outputs.VERSION }}

    - name: Run tests
      run: dotnet test .\ElBruno.CopilotCLIMonitor.sln --configuration Release --no-build --nologo

    - name: Pack CLI package
      run: dotnet pack .\src\ElBruno.CopilotCLIMonitor.Cli\ElBruno.CopilotCLIMonitor.Cli.csproj --configuration Release --no-build --output .\artifacts /p:Version=${{ steps.tag.outputs.VERSION }}

    - name: NuGet login
      id: login
      uses: NuGet/login@v1
      with:
        user: ${{ github.repository_owner }}

    - name: Publish to NuGet
      shell: pwsh
      run: |
        $packages = Get-ChildItem .\artifacts -Filter *.nupkg -File | Where-Object { $_.Name -notlike '*.snupkg' }
        foreach ($package in $packages) {
          dotnet nuget push $package.FullName `
            --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" `
            --source https://api.nuget.org/v3/index.json `
            --skip-duplicate
        }

    - name: Upload package to release
      uses: softprops/action-gh-release@v2
      with:
        files: .\artifacts\**\*.nupkg
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
